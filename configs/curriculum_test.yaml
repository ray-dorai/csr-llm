# Self-Directed Curriculum Test Configuration
# Cost estimate: ~15 min on A40 = ~$0.10
#
# Three conditions (self_correct / self_filter / random) × 3 seeds = 9 runs
# Each run: 20 rounds × 100 LoRA steps = 2000 gradient steps total
# Compare accuracy curves to find which curriculum strategy learns fastest.

experiment:
  name: "curriculum-test-001"
  seed: 42
  device: "cuda"
  output_dir: "logs/curriculum-test-001"

model:
  architecture: "gpt2"
  n_layers: 8
  n_heads: 4
  d_model: 256
  d_ff: 1024
  vocab_size: 19
  max_seq_len: 128
  dropout: 0.1

tokenizer:
  type: "char"
  vocab_size: 19

pretrain:
  n_examples: 50000
  n_epochs: 10
  batch_size: 64
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 200
  save_every_epoch: false

task:
  type: "arithmetic"
  operations: ["+", "-"]
  operand_range: [0, 9]
  test_set_size: 500
  test_set_seed: 12345

generation:
  initial_prefix: "3+5=8\n9-2=7\n1+8=9\n7-4=3\n"
  max_tokens_per_example: 20

# Required by config validator (not used in curriculum test)
evolution:
  population_size: 8
  n_islands: 2
  models_per_island: 4
  survivors_per_island: 1
  offspring_per_survivor: 4

offspring:
  n_steps: 200
  batch_size: 16
  learning_rate: 5.0e-4
  weight_decay: 0.0
  warmup_steps: 0

evaluation:
  method: "greedy_completion"
  max_new_tokens: 4
  temperature: 0.0

curriculum_test:
  conditions: ["self_correct", "self_filter", "random"]
  seeds: [1, 2, 3]

  # Training budget per round (same for all conditions — fair comparison)
  n_rounds: 20                 # rounds of training
  n_steps_per_round: 100       # LoRA gradient steps per round
  n_examples_per_round: 50     # examples to train on per round

  # Generation (self_correct and self_filter only)
  n_generate_per_round: 500    # model generation attempts per round
  generation_temp: 1.2

  # LoRA
  lora_rank: 8
  lora_lr: 5.0e-4
