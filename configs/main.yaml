# CSR-LLM Main Experiment Configuration
# Budget: ~$65 on RunPod A40
# Goal: 80-100 rounds with progressive difficulty

experiment:
  name: "main-001"
  seed: 42
  device: "cuda"
  output_dir: "logs/main-001"
  # Resume from pilot if available
  resume_from: null

model:
  architecture: "gpt2"
  n_layers: 8
  n_heads: 4
  d_model: 256
  d_ff: 1024
  vocab_size: 8192
  max_seq_len: 128
  dropout: 0.1

tokenizer:
  type: "bpe"
  vocab_size: 8192
  min_frequency: 2
  special_tokens: ["<pad>", "<eos>", "<bos>"]

pretrain:
  n_examples: 50000
  n_epochs: 50
  batch_size: 64
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 200
  save_every_epoch: true

task:
  type: "arithmetic"
  test_set_size: 500
  test_set_seed: 12345
  # Progressive difficulty schedule
  difficulty_schedule:
    - rounds: [1, 20]
      difficulty: "single_digit_add_sub"
      operations: ["+", "-"]
      operand_range: [0, 9]
    - rounds: [21, 40]
      difficulty: "two_digit_add_sub"
      operations: ["+", "-"]
      operand_range: [0, 99]
    - rounds: [41, 60]
      difficulty: "mixed_operations"
      operations: ["+", "-", "*"]
      operand_range: [0, 9]
    - rounds: [61, 80]
      difficulty: "two_digit_mixed"
      operations: ["+", "-", "*", "/"]
      operand_range: [1, 99]
    - rounds: [81, 100]
      difficulty: "multi_step"
      operations: ["+", "-", "*"]
      operand_range: [0, 9]
      multi_step: true

evolution:
  n_rounds: 100
  population_size: 64
  n_islands: 4
  models_per_island: 16
  survivors_per_island: 2
  offspring_per_survivor: 8
  offspring_distribution:
    clone: 1
    mutant_small: 4
    recombinant: 2
    mutant_large: 1
  mutation:
    sigma_small: 0.01
    sigma_large: 0.05
    target_layers: null
  migration:
    n_migrants_per_round: 1
    direction: "ring"
  selection:
    metric: "offspring_accuracy"
    direction: "maximize"
  # Temperature scheduling
  temperature_schedule:
    - rounds: [1, 30]
      generation_temp: 1.2
    - rounds: [31, 60]
      generation_temp: 1.0
    - rounds: [61, 100]
      generation_temp: 0.8

generation:
  n_examples: 100
  max_tokens_per_example: 20
  initial_prefix: "3+5=8\n9-2=7\n1+8=9\n7-4=3\n"
  prefix_mutation:
    swap_prob: 0.3
    add_prob: 0.2
    remove_prob: 0.2
    max_prefix_examples: 8
    min_prefix_examples: 2

offspring:
  base: "base_checkpoint"
  n_steps: 200
  batch_size: 16
  learning_rate: 5.0e-4
  weight_decay: 0.0
  warmup_steps: 0

evaluation:
  method: "greedy_completion"
  max_new_tokens: 4
  temperature: 0.0

checkpointing:
  save_parent_weights: true
  save_offspring_weights: false
  save_generation_raw: true
  save_generation_parsed: true
  save_scores_detailed: true
  save_prefixes: true
  compress_old_rounds: true
